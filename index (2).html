<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Кыргыз тили">
<title>Кыргыз тили — 5 класс</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
  .wrap { padding: 1.5rem 1rem 3rem; max-width: 480px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 1.5rem; padding-top: 0.5rem; }
  .header h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #888; }
  .progress-bar { background: #e0e0e0; border-radius: 99px; height: 6px; margin-bottom: 0.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.3s; }
  .q-counter { font-size: 13px; color: #888; text-align: right; margin-bottom: 6px; }
  .question-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .topic-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 99px; margin-bottom: 10px; font-weight: 500; }
  .question-text { font-size: 16px; color: #1a1a1a; font-weight: 600; line-height: 1.4; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1rem; }
  .option-btn { background: #f5f5f0; border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 12px 10px; font-size: 14px; color: #1a1a1a; cursor: pointer; text-align: center; transition: all 0.15s; font-family: inherit; font-weight: 500; }
  .option-btn:active:not(:disabled) { transform: scale(0.97); }
  .option-btn.correct { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
  .option-btn.wrong { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
  .option-btn.reveal { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
  .option-btn:disabled { cursor: default; }
  .feedback { margin-top: 10px; font-size: 14px; padding: 8px 12px; border-radius: 10px; }
  .feedback.ok { background: #EAF3DE; color: #3B6D11; }
  .feedback.bad { background: #FCEBEB; color: #A32D2D; }
  .next-btn { width: 100%; margin-top: 0.75rem; padding: 14px; font-size: 15px; border-radius: 14px; border: none; background: #1a1a1a; color: #fff; cursor: pointer; font-weight: 600; font-family: inherit; }
  .next-btn:active { transform: scale(0.98); }
  .result-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 20px; padding: 2rem 1.5rem; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .score-big { font-size: 52px; font-weight: 700; color: #1a1a1a; }
  .score-label { font-size: 14px; color: #888; margin-bottom: 1rem; }
  .stars { font-size: 30px; margin-bottom: 0.75rem; letter-spacing: 3px; }
  .result-msg { font-size: 15px; color: #444; margin-bottom: 1.5rem; line-height: 1.5; }
  .restart-btn { padding: 12px 28px; border-radius: 14px; border: none; background: #1a1a1a; color: #fff; cursor: pointer; font-size: 15px; font-weight: 600; font-family: inherit; }
  .restart-btn:active { transform: scale(0.98); }
  .breakdown { margin-top: 1.5rem; text-align: left; }
  .breakdown-title { font-size: 13px; color: #888; margin-bottom: 8px; font-weight: 500; }
  .breakdown-row { display: flex; justify-content: space-between; font-size: 14px; padding: 7px 0; border-bottom: 1px solid #f0f0f0; color: #1a1a1a; }
  .score-circle { width: 90px; height: 90px; border-radius: 50%; background: #f5f5f0; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; font-size: 28px; font-weight: 700; color: #1a1a1a; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🇰🇬 Кыргыз тили</h1>
    <p>Тест — 5 класс (русские школы)</p>
  </div>
  <div id="app"></div>
</div>

<script>
const ALL_QUESTIONS = [
  { topic: "Падежи", color: "#dbeafe", textColor: "#1e40af", questions: [
    { q: "Поставь МЕКТЕП в дательный падеж (кимге?)", opts: ["мектепке","мектептен","мектептин","мектепте"], ans: 0 },
    { q: "Поставь АПА в родительный падеж (кимдин?)", opts: ["апага","апанын","ападан","апада"], ans: 1 },
    { q: "Поставь ШААР в местный падеж (эмнеде?)", opts: ["шаарга","шааrdан","шаарда","шааrdын"], ans: 2 },
    { q: "Поставь ДОС в исходный падеж (кимден?)", opts: ["достон","достан","досто","досдун"], ans: 1 },
    { q: "Поставь МУГАЛИМ в родительный падеж", opts: ["мугалимге","мугалимдин","мугалимден","мугалимде"], ans: 1 },
    { q: "Поставь КИТЕП в местный падеж (эмнеде?)", opts: ["китепте","китептен","китепке","китептин"], ans: 0 },
    { q: "Поставь УЙ в винительный падеж (эмнени?)", opts: ["үйдө","үйдүн","үйдү","үйгө"], ans: 2 },
  ]},
  { topic: "Семья", color: "#d1fae5", textColor: "#065f46", questions: [
    { q: "Как по-кыргызски БАБУШКА?", opts: ["чоң ата","апа","чоң эне","эже"], ans: 2 },
    { q: "Как по-кыргызски МЛАДШИЙ БРАТ?", opts: ["байке","ини","эже","сиңди"], ans: 1 },
    { q: "Как по-кыргызски СТАРШАЯ СЕСТРА?", opts: ["апа","сиңди","ини","эже"], ans: 3 },
    { q: "Что значит БАЙКЕ?", opts: ["дедушка","младший брат","старший брат","папа"], ans: 2 },
    { q: "Что значит СИҢДИ?", opts: ["старшая сестра","бабушка","младшая сестра","мама"], ans: 2 },
    { q: "Как по-кыргызски ДЕДУШКА?", opts: ["чоң эне","ата","чоң ата","байке"], ans: 2 },
  ]},
  { topic: "Числа", color: "#fef3c7", textColor: "#92400e", questions: [
    { q: "Как по-кыргызски число 7?", opts: ["алты","жети","сегиз","беш"], ans: 1 },
    { q: "Как по-кыргызски число 20?", opts: ["отуз","он эки","жыйырма","кырк"], ans: 2 },
    { q: "Что значит ОН БЕШ?", opts: ["14","16","15","18"], ans: 2 },
    { q: "Как по-кыргызски число 30?", opts: ["жыйырма","кырк","элүү","отуз"], ans: 3 },
    { q: "Что значит СЕГИЗ?", opts: ["6","7","8","9"], ans: 2 },
    { q: "Как по-кыргызски ОН ЖЕТИ?", opts: ["16","17","18","15"], ans: 1 },
    { q: "Как по-кыргызски число 5?", opts: ["алты","беш","төрт","үч"], ans: 1 },
  ]},
  { topic: "Цвета", color: "#fce7f3", textColor: "#9d174d", questions: [
    { q: "Как по-кыргызски КРАСНЫЙ?", opts: ["сары","кызыл","жашыл","кара"], ans: 1 },
    { q: "Что значит САРЫ?", opts: ["синий","зелёный","жёлтый","белый"], ans: 2 },
    { q: "Как по-кыргызски ЗЕЛЁНЫЙ?", opts: ["көк","боз","жашыл","ак"], ans: 2 },
    { q: "Что значит КАРА?", opts: ["белый","серый","чёрный","коричневый"], ans: 2 },
    { q: "Как по-кыргызски БЕЛЫЙ?", opts: ["ак","боз","күрөң","көк"], ans: 0 },
    { q: "Что значит КӨК?", opts: ["красный","жёлтый","зелёный","синий"], ans: 3 },
  ]},
  { topic: "Животные", color: "#ede9fe", textColor: "#4c1d95", questions: [
    { q: "Как по-кыргызски ЛОШАДЬ?", opts: ["уй","кой","жылкы","ит"], ans: 2 },
    { q: "Что значит МЫШЫК?", opts: ["собака","кошка","овца","птица"], ans: 1 },
    { q: "Как по-кыргызски РЫБА?", opts: ["куш","балык","эчки","кой"], ans: 1 },
    { q: "Что значит КОЙ?", opts: ["коза","корова","овца","лошадь"], ans: 2 },
    { q: "Как по-кыргызски СОБАКА?", opts: ["мышык","куш","ит","балык"], ans: 2 },
    { q: "Что значит КУШ?", opts: ["рыба","кошка","птица","овца"], ans: 2 },
  ]},
  { topic: "Погода", color: "#e0f2fe", textColor: "#0c4a6e", questions: [
    { q: "Как по-кыргызски СНЕГ?", opts: ["жаан","шамал","кар","бороон"], ans: 2 },
    { q: "Что значит ШАМАЛ?", opts: ["дождь","буря","снег","ветер"], ans: 3 },
    { q: "Как по-кыргызски ЖАРКО?", opts: ["суук","бороон","ысык","жаан"], ans: 2 },
    { q: "Что значит ЖААН?", opts: ["снег","ветер","дождь","солнце"], ans: 2 },
    { q: "Как по-кыргызски ХОЛОДНО?", opts: ["ысык","суук","шамал","кар"], ans: 1 },
  ]},
  { topic: "Фразы", color: "#dcfce7", textColor: "#14532d", questions: [
    { q: "Как по-кыргызски СПАСИБО?", opts: ["салам","кечиресиз","рахмат","жакшы"], ans: 2 },
    { q: "Что значит САЛАМАТСЫЗБЫ?", opts: ["Привет","Здравствуйте","Спасибо","До свидания"], ans: 1 },
    { q: "Как сказать ДО СВИДАНИЯ?", opts: ["рахмат","жакшы","кечиресиз","жакшы калыңыз"], ans: 3 },
    { q: "Что значит КАНДАЙСЫЗ?", opts: ["Как вас зовут?","Извините","Как дела?","Хорошо"], ans: 2 },
    { q: "Как по-кыргызски ПРИВЕТ?", opts: ["рахмат","салам","жакшы","кечиресиз"], ans: 1 },
  ]},
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions() {
  let all = [];
  ALL_QUESTIONS.forEach(s => s.questions.forEach(q => all.push({ ...q, topic: s.topic, topicColor: s.color, topicText: s.textColor })));
  return shuffle(all).slice(0, 20);
}

let questions = buildQuestions();
let current = 0, score = 0, answered = false, topicScores = {};

function render() {
  const app = document.getElementById('app');
  if (current >= questions.length) { renderResult(app); return; }
  const q = questions[current];
  const pct = (current / questions.length) * 100;
  app.innerHTML = `
    <div class="q-counter">Вопрос ${current + 1} из ${questions.length}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-card">
      <span class="topic-badge" style="background:${q.topicColor};color:${q.topicText}">${q.topic}</span>
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o, i) => `<button class="option-btn" onclick="answer(${i})">${o}</button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>
    <button class="next-btn" id="nxt" style="display:none" onclick="next()">${current + 1 < questions.length ? 'Следующий →' : 'Результат →'}</button>
  `;
}

function answer(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  if (!topicScores[q.topic]) topicScores[q.topic] = { correct: 0, total: 0 };
  topicScores[q.topic].total++;
  const fb = document.getElementById('feedback');
  if (i === q.ans) {
    btns[i].classList.add('correct');
    fb.className = 'feedback ok';
    fb.textContent = '✓ Правильно!';
    score++;
    topicScores[q.topic].correct++;
  } else {
    btns[i].classList.add('wrong');
    btns[q.ans].classList.add('reveal');
    fb.className = 'feedback bad';
    fb.textContent = `✗ Правильно: ${q.opts[q.ans]}`;
  }
  document.getElementById('nxt').style.display = 'block';
}

function next() {
  answered = false;
  current++;
  render();
}

function renderResult(app) {
  const pct = Math.round((score / questions.length) * 100);
  const stars = pct >= 90 ? '★★★★★' : pct >= 75 ? '★★★★☆' : pct >= 60 ? '★★★☆☆' : pct >= 40 ? '★★☆☆☆' : '★☆☆☆☆';
  const msg = pct >= 90 ? 'Отлично! Ты готов к переводному тесту! 🎉' : pct >= 75 ? 'Хорошо! Ещё немного повторить — и будет отлично.' : pct >= 60 ? 'Неплохо! Повтори слабые темы.' : 'Нужно ещё потренироваться. Попробуй ещё раз!';
  const rows = Object.entries(topicScores).map(([t, s]) => `<div class="breakdown-row"><span>${t}</span><span style="font-weight:600">${s.correct}/${s.total}</span></div>`).join('');
  app.innerHTML = `
    <div class="result-card">
      <div class="stars">${stars}</div>
      <div class="score-big">${score}/${questions.length}</div>
      <div class="score-label">${pct}% правильных ответов</div>
      <div class="result-msg">${msg}</div>
      <button class="restart-btn" onclick="restart()">Попробовать ещё раз</button>
      <div class="breakdown">
        <div class="breakdown-title">Результаты по темам:</div>
        ${rows}
      </div>
    </div>
  `;
}

function restart() {
  questions = buildQuestions(); current = 0; score = 0; answered = false; topicScores = {};
  render();
}

render();
</script>
</body>
</html>
